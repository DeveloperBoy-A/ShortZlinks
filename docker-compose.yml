version: "3.9"

services:
  app:
    build: .
    container_name: shortzlinks_app
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: shortzlinks_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: shortzlinks
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: