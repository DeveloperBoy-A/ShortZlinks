
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Shortzlinks{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    {% if session.get('user_id') %}
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <i class="fas fa-link"></i> <span>Shortzlinks</span>
            </div>
            <ul class="nav-links">
                <li><a href="{{ url_for('dashboard') }}"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="{{ url_for('manage_links') }}"><i class="fas fa-link"></i> Links</a></li>
                <li><a href="{{ url_for('referrals') }}"><i class="fas fa-users"></i> Referrals</a></li>
                <li><a href="{{ url_for('withdrawal') }}"><i class="fas fa-money-bill"></i> Withdrawal</a></li>
                <li><a href="{{ url_for('settings') }}"><i class="fas fa-cog"></i> Settings</a></li>
                <li class="user-dropdown">
                    <a href="#"><i class="fas fa-user"></i> {{ session.get('username') }}</a>
                    <div class="dropdown-menu">
                        <a href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </div>
                </li>
            </ul>
        </div>
    </nav>
    {% endif %}

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2024 Shortzlinks. All rights reserved.</p>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
