{% extends "base.html" %}

{% block title %}404 - Not Found{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-content">
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>Sorry, this link doesn't exist or has expired.</p>
        
        <div class="error-actions">
            <a href="{{ url_for('index') }}" class="btn btn-primary">Go to Home</a>
            {% if session.get('user_id') %}
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">My Dashboard</a>
            {% else %}
            <a href="{{ url_for('login') }}" class="btn btn-secondary">Sign In</a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
