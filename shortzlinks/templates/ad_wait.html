<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shortzlinks - Redirecting...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .ad-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .ad-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .ad-header h1 {
            font-size: 1.8em;
            margin-bottom: 10px;
        }

        .ad-header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .ad-content {
            padding: 40px 30px;
            text-align: center;
        }

        .ad-space {
            background: #f0f0f0;
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 40px;
            margin-bottom: 30px;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 1.1em;
            font-weight: 500;
        }

        .countdown {
            margin: 30px 0;
            font-size: 1.3em;
            color: #2d3748;
            font-weight: bold;
        }

        .countdown span {
            display: block;
            font-size: 3em;
            color: #667eea;
            margin: 15px 0;
        }

        .skip-button {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            margin-top: 20px;
        }

        .skip-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .skip-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .url-preview {
            background: #f7fafc;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            word-break: break-all;
            font-size: 0.9em;
            color: #4a5568;
        }

        .info-text {
            color: #718096;
            font-size: 0.9em;
            margin-top: 20px;
        }

        /* Ad Network Placeholder */
        .google-ads {
            background: white;
            padding: 15px;
            text-align: center;
            color: #999;
            font-size: 0.8em;
        }

        @media (max-width: 600px) {
            .ad-container {
                border-radius: 0;
            }
            .ad-content {
                padding: 20px;
            }
            .countdown span {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="ad-container">
        <div class="ad-header">
            <h1>Shortzlinks</h1>
            <p>You'll be redirected shortly...</p>
        </div>

        <div class="ad-content">
            <!-- Ad Space for Google Ads / Adsterra / Monetag -->
            <div class="ad-space" id="adSpace">
                <!-- Ad Network Code Here -->
                <div class="google-ads">
                    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-xxxxxxxxxxxxxxxx"
                     crossorigin="anonymous"></script>
                    <!-- Ad Unit -->
                    <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-xxxxxxxxxxxxxxxx"
                     data-ad-slot="xxxxxxxxxx"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                    <script>
                     (adsbygoogle = window.adsbygoogle || []).push({});
                    </script>
                </div>
            </div>

            <!-- Countdown Timer -->
            <div class="countdown">
                <div>Link Opens In:</div>
                <span id="countdown">5</span>
            </div>

            <!-- Skip Button -->
            <button id="skipBtn" class="skip-button" disabled>
                Skip Ad & Continue
            </button>

            <!-- URL Preview -->
            <div class="url-preview">
                <strong>Going to:</strong><br>
                {{ title }}
            </div>

            <!-- Info Text -->
            <div class="info-text">
                ✓ Your click helps content creators earn money<br>
                ✓ All links are safe and verified<br>
                ✓ This is an ad-supported service
            </div>
        </div>
    </div>

    <script>
        let countdown = 5;
        const skipBtn = document.getElementById('skipBtn');
        const countdownSpan = document.getElementById('countdown');
        const shortCode = '{{ short_code }}';

        // Countdown Timer
        const countdownInterval = setInterval(() => {
            countdown--;
            countdownSpan.textContent = countdown;

            if (countdown <= 0) {
                clearInterval(countdownInterval);
                skipBtn.disabled = false;
                skipBtn.textContent = 'Click Here to Continue';
                countdownSpan.textContent = '0';
                redirectNow();
            }
        }, 1000);

        // Skip Button
        skipBtn.addEventListener('click', redirectNow);

        function redirectNow() {
            // Get redirect URL via API
            fetch(`/api/redirect/${shortCode}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = data.redirect_url;
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    // Fallback redirect
                    window.location.href = `/${shortCode}`;
                });
        }

        // Auto redirect if user didn't click
        setTimeout(redirectNow, 6000);
    </script>
</body>
</html>
